name: ntf-client
on:
  push:
    paths:
      - 'ntf-client/**'

  pull_request:
    paths:
      - 'ntf-client/**'


jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Install deps
        working-directory: ntf-client
        shell: bash --noprofile --norc -x -eo pipefail {0}
        run: |
          go mod download
          go install honnef.co/go/tools/cmd/staticcheck@latest
          go install github.com/client9/misspell/cmd/misspell@latest

      - name: Run linters
        working-directory: ntf-client
        shell: bash --noprofile --norc -x -eo pipefail {0}
        run: |
          $(exit $(go fmt ./... | wc -l))
          go vet ./...
          staticcheck ./...
          find . -type f -name "*.go" | xargs misspell -error -locale US

  test:
    runs-on: ubuntu-latest

    # The job runs in a container so it joins the services' user-defined bridge
    # network: it can then reach the tester — and the random per-server ports it
    # opens — by the service's hostname, with no port mapping.
    container: golang:1.26-alpine

    services:
      # the ntf-server service, reachable from this job as host "nats".
      nats:
        image: synadia/ntf-server:2.14
        # --advertise nats makes discovered cluster servers (and the generated
        # TLS cert SANs) resolve as "nats" from inside the job container.
        command: serve --advertise nats
        # --name only eases `docker logs nats` when debugging.
        options: --name nats

    steps:
      # actions/checkout needs git, which the alpine image does not ship.
      - name: Install git
        shell: sh
        run: apk add --no-cache git

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run tests
        working-directory: ntf-client
        shell: sh
        env:
          NATS_TESTER_URL: nats://nats:4222
        run: |
          go test -v -count=1 ./...